name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude-from='.gitignore' \
            ./ root@${{ secrets.DEPLOY_HOST }}:/opt/website/

      - name: Install service and restart
        run: |
          ssh root@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -eu

            command -v uv >/dev/null || {
              echo "uv is required on the deploy host."
              exit 1
            }

            uv python find --no-python-downloads '>=3.14' >/dev/null || {
              echo "Python 3.14+ is required on the deploy host."
              exit 1
            }

            id -u website >/dev/null 2>&1 || {
              echo "The deploy host must have a website user."
              exit 1
            }

            cp /opt/website/website.service /etc/systemd/system/website.service
            chown -R website:website /opt/website
            su -s /bin/sh -c 'cd /opt/website && uv sync --locked --no-python-downloads' website
            su -s /bin/sh -c 'cd /opt/website && uv run python -m app.build_assets' website
            systemctl daemon-reload
            systemctl enable website
            systemctl restart website
          EOF
