name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files
        run: |
          rsync -avz --delete --chown=website:website \
            --exclude='.git/' \
            --exclude-from='.gitignore' \
            ./ root@${{ secrets.DEPLOY_HOST }}:/opt/website/

      - name: Deploy on server
        run: |
          ssh root@${{ secrets.DEPLOY_HOST }} 'cd /opt/website && ./deploy/deploy.sh'
