<section class="entry-list">
    % for item in items:
        <article class="entry entry-post ${'entry-hidden' if item['hidden'] == 1 else ''}">
            <header class="entry-header">
                <p class="entry-meta">Post <span class="entry-separator">/</span> ${item["published_on"].strftime("%Y-%m-%d")}</p>
                <h2>${item["title"]}</h2>
            </header>

            <div class="entry-copy">${item["body"]}</div>

            % if current_user.is_authenticated:
                <div class="actions">
                    <a href="/posts/edit/${item['id']}"> Edit </a>
                    <a href="/posts/delete/${item['id']}"> Delete </a>
                </div>
            % endif
        </article>
    % endfor

    %if not items:
        <p> Nothing here yet. </p>
    % endif
</section>
