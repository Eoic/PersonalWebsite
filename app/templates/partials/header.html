<header class="rail-header">
    <div class="identity-block">
        <h2>${personal['name']}</h2>
        <p>${position['name']} @ ${position['company']}.</p>
        <p>${personal['location']}</p>

        % if current_user.is_authenticated:
            <a href="/logout"> Logout </a>
        % endif
    </div>

    <div class="rail-actions">
        <button id="theme-switcher" class="btn" type="button" aria-label="Toggle theme"></button> <br>
        <button id="view-switcher" class="btn" type="button" aria-label="Toggle view mode"></button>
    </div>

    <ul class="contact-list" aria-label="Contact and profile links">
        <li><a href="https://www.github.com/Eoic" target="_blank" rel="noopener noreferrer">github</a></li>
        <li><a href="https://www.linkedin.com/in/karolis-strazdas" target="_blank" rel="noopener noreferrer">linkedin</a></li>
        <li><a href="mailto:karolis.strazdas@protonmail.com">email</a></li>
    </ul>
</header>
