<%inherit file="../partials/layout.html" />

<section class="garden-page" data-garden-root data-state-endpoint="/garden/state" data-actions-endpoint="/garden/actions">
    <div class="garden-toolbar" role="toolbar" aria-label="Garden tools">
        <div class="garden-tool-group">
            <span class="garden-tool-label">/tool</span>
            <div class="garden-btn-group" data-tool-group>
                <button class="garden-btn is-active" type="button" data-tool="plant" aria-pressed="true">
                    plant<span class="garden-kbd">P</span>
                </button>
                <button class="garden-btn" type="button" data-tool="water" aria-pressed="false">
                    water<span class="garden-kbd">W</span>
                </button>
                <button class="garden-btn" type="button" data-tool="prune" aria-pressed="false">
                    prune<span class="garden-kbd">X</span>
                </button>
                <button class="garden-btn" type="button" data-origin-btn>
                    origin<span class="garden-kbd">O</span>
                </button>
            </div>
        </div>

        <div class="garden-tool-group" data-species-group>
            <span class="garden-tool-label">/species</span>
            <div class="garden-btn-group" data-species-buttons></div>
        </div>
    </div>

    <div class="garden-grid-wrap">
        <div class="garden-grid" data-garden-surface tabindex="0" role="application" aria-label="Garden grid">
            <div class="garden-grid-dots" data-grid-dots></div>
            <div class="garden-axis garden-axis-h" data-axis-h></div>
            <div class="garden-axis garden-axis-v" data-axis-v></div>
            <div class="garden-flowers" data-flowers></div>
            <div class="garden-cell-hover" data-cell-hover hidden></div>
            <div class="garden-cell-tip" data-cell-tip hidden></div>
            <div class="garden-coord-readout" data-coord-readout></div>
        </div>
    </div>

    <div class="garden-stats-panel">
        <div class="garden-stats-col">
            <div class="garden-stats-heading">/planted</div>
            <div class="garden-stat-row">
                <span class="garden-stat-k">total ever</span>
                <span class="garden-stat-v" data-stat-total>0000</span>
            </div>
            <div class="garden-stat-row">
                <span class="garden-stat-k">alive now</span>
                <span class="garden-stat-v" data-stat-alive>0000</span>
            </div>
            <div class="garden-stat-row">
                <span class="garden-stat-k">health</span>
                <span class="garden-stat-v" data-stat-health>dormant</span>
            </div>
            <div class="garden-stat-row">
                <span class="garden-stat-k">in bloom</span>
                <span class="garden-stat-v" data-stat-bloom>0%</span>
            </div>
        </div>

        <div class="garden-stats-col garden-stats-col-season">
            <div class="garden-stats-heading">/season</div>
            <div class="garden-stat-row">
                <span class="garden-stat-k">season</span>
                <span class="garden-stat-v" data-stat-season></span>
            </div>
            <div class="garden-stat-row">
                <span class="garden-stat-k">weather</span>
                <span class="garden-stat-v" data-stat-weather></span>
            </div>
            <div class="garden-stat-row">
                <span class="garden-stat-k">wind</span>
                <span class="garden-stat-v" data-stat-wind></span>
            </div>
            <div class="garden-stat-row">
                <span class="garden-stat-k">time</span>
                <span class="garden-stat-v" data-stat-time></span>
            </div>
        </div>

        <div class="garden-stats-col">
            <div class="garden-stats-heading">/legend</div>
            <div data-legend></div>
        </div>
    </div>

    <div class="garden-activity-log">
        <div class="garden-stats-heading">/activity</div>
        <div data-activity></div>
    </div>
</section>
